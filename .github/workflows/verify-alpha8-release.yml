name: Verify alpha.8 public release

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view v0.8.1-alpha.8 --repo "$GITHUB_REPOSITORY" --json tagName,name,publishedAt,assets > /tmp/release.json
          cat /tmp/release.json

          portable=$(jq -r '[.assets[].name] | index("Sidecar-Portable-win-x64.exe") != null' /tmp/release.json)
          canonical=$(jq -r '[.assets[].name] | index("Sidecar.exe") != null' /tmp/release.json)
          latestTag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 10 --json tagName,isLatest --jq '.[] | select(.isLatest == true) | .tagName')

          test "$portable" = true
          test "$canonical" = true
          test "$latestTag" = 'v0.8.1-alpha.8'
          echo 'alpha.8 release is public, latest, and contains both executables.'
