name: Native Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  native-diagnostic:
    runs-on: windows-latest
    steps:
      - name: Build Sidecar and print concise failures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $log = Join-Path $env:RUNNER_TEMP 'sidecar-native-build.log'
          dotnet build apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --verbosity:minimal *> $log
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            Write-Host '=== NATIVE BUILD FAILURE ==='
            Get-Content $log |
              Select-String -Pattern ': error |error CS|error MSB|error NETSDK|Build FAILED|warning CS' -Context 0,2 |
              ForEach-Object { $_.ToString() }
            Write-Host '=== END NATIVE BUILD FAILURE ==='
            exit $status
          }

          Get-Content $log | Select-Object -Last 20
