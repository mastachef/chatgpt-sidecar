name: test

on:
  push:
  pull_request:

jobs:
  node-test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node --check bin/sidecar.mjs
      - run: node --check bin/sidecar-quickchat.mjs
      - run: node --check bin/install-quickchat.mjs
      - run: node --check src/local-session.mjs
      - run: node --check mcp/server.mjs
