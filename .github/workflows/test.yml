name: test

on:
  push:
  pull_request:

jobs:
  node-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node --check bin/sidecar.mjs
      - run: node --check src/local-session.mjs
