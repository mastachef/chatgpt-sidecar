name: test

on:
  push:
  pull_request:

jobs:
  node-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Run Node tests and syntax checks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $log = Join-Path $env:RUNNER_TEMP 'sidecar-node-test.log'
          npm test *> $log
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            Write-Host '=== NODE TEST FAILURE ==='
            Get-Content $log |
              Select-String -Pattern '^(not ok|# fail|# tests|# pass)|failureType:|error:|stack:|location:|code:|expected:|actual:|operator:' -Context 0,4 |
              ForEach-Object { $_.ToString() }
            Write-Host '=== END NODE TEST FAILURE ==='
            exit $status
          }

          $files = @(
            'bin/sidecar.mjs',
            'bin/sidecar-quickchat.mjs',
            'bin/install-quickchat.mjs',
            'src/local-session.mjs',
            'mcp/server.mjs'
          )
          foreach ($file in $files) {
            node --check $file
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Get-Content $log | Select-Object -Last 20
