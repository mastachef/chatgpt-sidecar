name: Publish Sidecar Release

on:
  push:
    branches:
      - main
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".codex-plugin/plugin.json"
      - "README.md"
      - "docs/CODE_SIGNING.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read and validate release version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content apps/Sidecar.Dock/Sidecar.Dock.csproj -Raw
          $versionNode = $project.SelectSingleNode('/Project/PropertyGroup/Version')
          if ($null -eq $versionNode -or [string]::IsNullOrWhiteSpace($versionNode.InnerText)) {
            throw 'Sidecar.Dock.csproj does not contain a Version value.'
          }

          $version = $versionNode.InnerText.Trim()
          $plugin = Get-Content .codex-plugin/plugin.json -Raw | ConvertFrom-Json
          if ($plugin.version -ne $version) {
            throw "Plugin version $($plugin.version) does not match native version $version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "title=Sidecar v$version" >> $env:GITHUB_OUTPUT

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
          dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj `
            --configuration Release `
            --no-restore `
            --logger "console;verbosity=minimal"

      - name: Build portable executable
        shell: pwsh
        run: |
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/published

          New-Item -ItemType Directory -Force artifacts/release | Out-Null
          Copy-Item artifacts/published/Sidecar.exe artifacts/release/Sidecar.exe

          if (-not (Test-Path artifacts/release/Sidecar.exe)) {
            throw 'Sidecar.exe was not produced.'
          }

          $expectedArtworkHash = 'b2eca7a7065f44de22cde4b5a9caec3ad6e048f21fc1c012654ba63bb882d144'
          $actualArtworkHash = (Get-FileHash apps/Sidecar.Dock/Assets/Sidecar.ico -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualArtworkHash -ne $expectedArtworkHash) {
            throw "Canonical Sidecar artwork mismatch. Expected $expectedArtworkHash, found $actualArtworkHash."
          }

          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path artifacts/release/Sidecar.exe))
          if ($null -eq $icon -or $icon.Width -lt 16 -or $icon.Height -lt 16) {
            throw 'Sidecar.exe does not contain a valid application icon.'
          }
          $icon.Dispose()

      - name: Upload unsigned executable for trusted signing
        id: unsigned_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sidecar-unsigned-${{ github.sha }}
          path: artifacts/release/Sidecar.exe
          if-no-files-found: error
          retention-days: 1

      - name: Detect signing provider
        id: signing
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERT_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
        run: |
          $signPathValues = @(
            $env:SIGNPATH_API_TOKEN,
            $env:SIGNPATH_ORGANIZATION_ID,
            $env:SIGNPATH_PROJECT_SLUG,
            $env:SIGNPATH_SIGNING_POLICY_SLUG
          )
          $signPathReady = ($signPathValues | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0

          $artifactSigningValues = @(
            $env:AZURE_CLIENT_ID,
            $env:AZURE_TENANT_ID,
            $env:AZURE_SUBSCRIPTION_ID,
            $env:ARTIFACT_SIGNING_ENDPOINT,
            $env:ARTIFACT_SIGNING_ACCOUNT_NAME,
            $env:ARTIFACT_SIGNING_CERT_PROFILE_NAME
          )
          $artifactSigningReady = ($artifactSigningValues | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0

          $mode = if ($signPathReady) {
            'signpath'
          }
          elseif ($artifactSigningReady) {
            'artifact-signing'
          }
          else {
            'none'
          }

          "mode=$mode" >> $env:GITHUB_OUTPUT
          Write-Host "Release signing mode: $mode"

      - name: Sign with SignPath
        if: steps.signing.outputs.mode == 'signpath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned_artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}\artifacts\signpath-signed

      - name: Install SignPath result
        if: steps.signing.outputs.mode == 'signpath'
        shell: pwsh
        run: |
          $signed = Get-ChildItem artifacts/signpath-signed -Recurse -File -Filter Sidecar.exe | Select-Object -First 1
          if ($null -eq $signed) {
            throw 'SignPath completed but no signed Sidecar.exe was returned.'
          }
          Copy-Item $signed.FullName artifacts/release/Sidecar.exe -Force

      - name: Azure login for Artifact Signing
        if: steps.signing.outputs.mode == 'artifact-signing'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Microsoft Artifact Signing
        if: steps.signing.outputs.mode == 'artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
          files: ${{ github.workspace }}\artifacts\release\Sidecar.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Sidecar
          description-url: https://github.com/mastachef/chatgpt-sidecar

      - name: Skip unsigned public release
        if: steps.signing.outputs.mode == 'none'
        shell: pwsh
        run: |
          Write-Warning 'Trusted signing is not configured. Build and tests succeeded, but no public executable will be published.'
          Write-Host 'Configure SignPath or Microsoft Artifact Signing to enable GitHub Releases.'

      - name: Verify signed executable and create portable alias
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        run: |
          $canonical = 'artifacts/release/Sidecar.exe'
          $signature = Get-AuthenticodeSignature $canonical
          if ($signature.Status -ne 'Valid' -or $null -eq $signature.SignerCertificate) {
            throw "Sidecar.exe signature validation failed: $($signature.Status) - $($signature.StatusMessage)"
          }

          $portable = 'artifacts/release/Sidecar-Portable-win-x64.exe'
          Copy-Item $canonical $portable -Force

          if ((Get-FileHash $canonical -Algorithm SHA256).Hash -ne (Get-FileHash $portable -Algorithm SHA256).Hash) {
            throw 'Portable release copy does not match the signed canonical Sidecar.exe.'
          }

          $portableSignature = Get-AuthenticodeSignature $portable
          if ($portableSignature.Status -ne 'Valid') {
            throw "Portable Sidecar signature validation failed: $($portableSignature.Status)"
          }

      - name: Create release notes
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: |
          $signingText = if ($env:SIGNING_MODE -eq 'signpath') {
            'SignPath trusted Authenticode signing'
          }
          else {
            'Microsoft Artifact Signing Public Trust'
          }

          @"
          ## Sidecar v$env:RELEASE_VERSION

          Native Windows ChatGPT companion for Codex planning, debugging, review, and implementation handoff.

          ### Downloads

          - ``Sidecar-Portable-win-x64.exe`` — portable self-contained Windows build for manual downloads
          - ``Sidecar.exe`` — identical canonical asset used by Sidecar's built-in updater

          Both executables are verified after $signingText and are byte-for-byte identical.

          ### Release highlights

          - manual drag-to-attach docking to the exact Codex window
          - persistent embedded ChatGPT session
          - bounded Codex conversation and repository context preview
          - secret filtering and populate-only ChatGPT handoff
          - return-to-Codex handoff workflow
          - themed native window chrome
          - secure in-app updater with SHA-256 and Authenticode verification

          Sidecar populates prompts but does not auto-submit them.
          "@ | Set-Content artifacts/release-notes.md

      - name: Publish GitHub release
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.title }}
        run: |
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          $exists = $LASTEXITCODE -eq 0

          if ($exists) {
            $assets = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
            foreach ($asset in $assets) {
              if (-not [string]::IsNullOrWhiteSpace($asset)) {
                gh release delete-asset $env:RELEASE_TAG $asset --repo $env:GITHUB_REPOSITORY --yes
              }
            }

            gh release upload $env:RELEASE_TAG `
              artifacts/release/Sidecar-Portable-win-x64.exe `
              artifacts/release/Sidecar.exe `
              --repo $env:GITHUB_REPOSITORY

            gh release edit $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
          else {
            gh release create $env:RELEASE_TAG `
              artifacts/release/Sidecar-Portable-win-x64.exe `
              artifacts/release/Sidecar.exe `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
