name: Publish Sidecar Release

on:
  push:
    branches:
      - main
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - "package.json"
      - "README.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"
          "version=$($package.version)" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=Sidecar $tag" >> $env:GITHUB_OUTPUT

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
          dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=minimal"

      - name: Publish Sidecar.exe
        shell: pwsh
        run: |
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/published

          New-Item -ItemType Directory -Force artifacts/release | Out-Null
          Copy-Item artifacts/published/Sidecar.exe artifacts/release/Sidecar.exe
          Copy-Item apps/Sidecar.Dock/README-FIRST.txt artifacts/release/README-FIRST.txt

          if (-not (Test-Path artifacts/release/Sidecar.exe)) {
            throw 'Sidecar.exe was not produced.'
          }

          $expectedArtworkHash = 'b2eca7a7065f44de22cde4b5a9caec3ad6e048f21fc1c012654ba63bb882d144'
          $actualArtworkHash = (Get-FileHash apps/Sidecar.Dock/Assets/Sidecar.ico -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualArtworkHash -ne $expectedArtworkHash) {
            throw "Canonical Sidecar artwork mismatch. Expected $expectedArtworkHash, found $actualArtworkHash."
          }

          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path artifacts/release/Sidecar.exe))
          if ($null -eq $icon -or $icon.Width -lt 16 -or $icon.Height -lt 16) {
            throw 'Sidecar.exe does not contain a valid application icon.'
          }
          $icon.Dispose()

          $unexpected = Get-ChildItem artifacts/release -File | Where-Object { $_.Name -notin @('Sidecar.exe', 'README-FIRST.txt') }
          if ($unexpected) {
            throw "Unexpected public release files: $($unexpected.Name -join ', ')"
          }

      - name: Upload unsigned build for trusted signing
        id: unsigned_artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sidecar-unsigned-${{ github.sha }}
          path: artifacts/release/Sidecar.exe
          if-no-files-found: error
          retention-days: 1

      - name: Detect signing configuration
        id: signing
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERT_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
        run: |
          $signPathRequired = @(
            $env:SIGNPATH_API_TOKEN,
            $env:SIGNPATH_ORGANIZATION_ID,
            $env:SIGNPATH_PROJECT_SLUG,
            $env:SIGNPATH_SIGNING_POLICY_SLUG
          )
          $signPathEnabled = ($signPathRequired | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0

          $artifactSigningRequired = @(
            $env:AZURE_CLIENT_ID,
            $env:AZURE_TENANT_ID,
            $env:AZURE_SUBSCRIPTION_ID,
            $env:ARTIFACT_SIGNING_ENDPOINT,
            $env:ARTIFACT_SIGNING_ACCOUNT_NAME,
            $env:ARTIFACT_SIGNING_CERT_PROFILE_NAME
          )
          $artifactSigningEnabled = ($artifactSigningRequired | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0

          if ($signPathEnabled) {
            $mode = 'signpath'
          }
          elseif ($artifactSigningEnabled) {
            $mode = 'artifact-signing'
          }
          else {
            $mode = 'none'
          }

          "mode=$mode" >> $env:GITHUB_OUTPUT
          Write-Host "Release signing mode: $mode"

      - name: Sign Sidecar.exe with SignPath
        if: steps.signing.outputs.mode == 'signpath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned_artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}\artifacts\signpath-signed

      - name: Install SignPath-signed executable
        if: steps.signing.outputs.mode == 'signpath'
        shell: pwsh
        run: |
          $signed = Get-ChildItem artifacts/signpath-signed -Recurse -File -Filter Sidecar.exe | Select-Object -First 1
          if ($null -eq $signed) {
            throw 'SignPath completed but no signed Sidecar.exe was returned.'
          }
          Copy-Item $signed.FullName artifacts/release/Sidecar.exe -Force

      - name: Azure login for Artifact Signing
        if: steps.signing.outputs.mode == 'artifact-signing'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Sidecar.exe with Microsoft Artifact Signing
        if: steps.signing.outputs.mode == 'artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
          files: ${{ github.workspace }}\artifacts\release\Sidecar.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Sidecar
          description-url: https://github.com/mastachef/chatgpt-sidecar

      - name: Skip unsigned public release
        if: steps.signing.outputs.mode == 'none'
        shell: pwsh
        run: |
          Write-Warning 'Trusted signing is not configured yet. The build and tests succeeded, but no public Sidecar release will be published.'
          Write-Host 'Configure SignPath or Microsoft Artifact Signing to enable publishing. Unsigned Sidecar.exe remains restricted to the short-lived Actions artifact only.'

      - name: Verify Authenticode signature
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature artifacts/release/Sidecar.exe
          $signature | Format-List Status,StatusMessage,SignerCertificate,TimeStamperCertificate
          if ($signature.Status -ne 'Valid') {
            throw "Sidecar.exe signature validation failed: $($signature.Status) - $($signature.StatusMessage)"
          }
          if ($null -eq $signature.SignerCertificate) {
            throw 'Sidecar.exe has no signer certificate after the signing step.'
          }

      - name: Create portable release copy
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        run: |
          $source = 'artifacts/release/Sidecar.exe'
          $portable = 'artifacts/release/Sidecar-Portable-win-x64.exe'
          Copy-Item $source $portable -Force

          $sourceHash = (Get-FileHash $source -Algorithm SHA256).Hash
          $portableHash = (Get-FileHash $portable -Algorithm SHA256).Hash
          if ($sourceHash -ne $portableHash) {
            throw 'Portable release copy does not match the signed canonical Sidecar.exe.'
          }

          $signature = Get-AuthenticodeSignature $portable
          if ($signature.Status -ne 'Valid') {
            throw "Portable Sidecar signature validation failed: $($signature.Status) - $($signature.StatusMessage)"
          }

      - name: Create release notes
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: |
          $signatureLine = if ($env:SIGNING_MODE -eq 'signpath') {
            '- ``Sidecar.exe`` and the portable copy are Authenticode-signed and timestamped through SignPath.'
          }
          else {
            '- ``Sidecar.exe`` and the portable copy are Authenticode-signed and timestamped with Microsoft Artifact Signing Public Trust.'
          }

          @"
          ## Sidecar v$env:RELEASE_VERSION

          A Windows ChatGPT companion designed to preserve valuable Codex usage by offloading planning, debugging, review, and repository analysis—then returning the completed work to Codex as a detailed implementation handoff.

          ### Downloads

          - ``Sidecar-Portable-win-x64.exe`` — clearly labeled portable single-file build; put it in any normal user-writable folder and run it
          - ``Sidecar.exe`` — identical signed build retained as the canonical asset used by Sidecar's built-in updater
          - ``README-FIRST.txt`` — short setup, handoff, and troubleshooting guide
          $signatureLine

          ### Changes

          - added a clearly labeled portable Windows executable to GitHub Releases
          - retained ``Sidecar.exe`` so existing Sidecar installations can continue discovering and verifying updates
          - added a built-in update checker and installer backed by GitHub Releases
          - updates require both the GitHub release asset SHA-256 digest and a valid trusted Authenticode signature before replacement
          - the updater swaps the executable only after Sidecar exits, keeps rollback protection, and restarts the verified build
          - retained themed window chrome, exact manual drag-to-attach docking, context preview, secret filtering, and populate-only safety

          ### Code signing policy

          Every public Sidecar executable must come from this repository's automated release build and pass trusted Authenticode verification before publication. See https://github.com/mastachef/chatgpt-sidecar/blob/main/docs/CODE_SIGNING.md

          Sidecar populates prompts but does not auto-submit them.
          "@ | Set-Content artifacts/release-notes.md

      - name: Publish and mark latest
        if: steps.signing.outputs.mode != 'none'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.title }}
        run: |
          $exists = $false
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            $exists = $true
          }

          if ($exists) {
            $assets = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
            foreach ($asset in $assets) {
              if (-not [string]::IsNullOrWhiteSpace($asset)) {
                gh release delete-asset $env:RELEASE_TAG $asset --repo $env:GITHUB_REPOSITORY --yes
              }
            }

            gh release upload $env:RELEASE_TAG `
              artifacts/release/Sidecar-Portable-win-x64.exe `
              artifacts/release/Sidecar.exe `
              artifacts/release/README-FIRST.txt `
              --repo $env:GITHUB_REPOSITORY

            gh release edit $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
          else {
            gh release create $env:RELEASE_TAG `
              artifacts/release/Sidecar-Portable-win-x64.exe `
              artifacts/release/Sidecar.exe `
              artifacts/release/README-FIRST.txt `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
