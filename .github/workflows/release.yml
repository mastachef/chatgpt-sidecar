name: Publish Sidecar Release

on:
  push:
    branches:
      - main
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - "package.json"
      - "README.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"
          "version=$($package.version)" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=Sidecar $tag" >> $env:GITHUB_OUTPUT

      - name: Restore and test
        shell: pwsh
        run: |
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
          dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=minimal"

      - name: Publish Sidecar.exe
        shell: pwsh
        run: |
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/published

          New-Item -ItemType Directory -Force artifacts/release | Out-Null
          Copy-Item artifacts/published/Sidecar.exe artifacts/release/Sidecar.exe
          Copy-Item apps/Sidecar.Dock/README-FIRST.txt artifacts/release/README-FIRST.txt

          if (-not (Test-Path artifacts/release/Sidecar.exe)) {
            throw 'Sidecar.exe was not produced.'
          }

          $expectedArtworkHash = 'b2eca7a7065f44de22cde4b5a9caec3ad6e048f21fc1c012654ba63bb882d144'
          $actualArtworkHash = (Get-FileHash apps/Sidecar.Dock/Assets/Sidecar.ico -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualArtworkHash -ne $expectedArtworkHash) {
            throw "Canonical Sidecar artwork mismatch. Expected $expectedArtworkHash, found $actualArtworkHash."
          }

          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path artifacts/release/Sidecar.exe))
          if ($null -eq $icon -or $icon.Width -lt 16 -or $icon.Height -lt 16) {
            throw 'Sidecar.exe does not contain a valid application icon.'
          }
          $icon.Dispose()

          $unexpected = Get-ChildItem artifacts/release -File | Where-Object { $_.Name -notin @('Sidecar.exe', 'README-FIRST.txt') }
          if ($unexpected) {
            throw "Unexpected public release files: $($unexpected.Name -join ', ')"
          }

      - name: Detect Artifact Signing configuration
        id: signing
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERT_PROFILE_NAME: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
        run: |
          $required = @(
            $env:AZURE_CLIENT_ID,
            $env:AZURE_TENANT_ID,
            $env:AZURE_SUBSCRIPTION_ID,
            $env:ARTIFACT_SIGNING_ENDPOINT,
            $env:ARTIFACT_SIGNING_ACCOUNT_NAME,
            $env:ARTIFACT_SIGNING_CERT_PROFILE_NAME
          )
          $enabled = ($required | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0
          "enabled=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Azure login for Artifact Signing
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Sidecar.exe with Microsoft Artifact Signing
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE_NAME }}
          files: ${{ github.workspace }}\artifacts\release\Sidecar.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Sidecar
          description-url: https://github.com/mastachef/chatgpt-sidecar

      - name: Verify Authenticode signature
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature artifacts/release/Sidecar.exe
          $signature | Format-List Status,StatusMessage,SignerCertificate,TimeStamperCertificate
          if ($signature.Status -ne 'Valid') {
            throw "Sidecar.exe signature validation failed: $($signature.Status) - $($signature.StatusMessage)"
          }

      - name: Warn when release is unsigned
        if: steps.signing.outputs.enabled != 'true'
        shell: pwsh
        run: |
          Write-Warning 'Artifact Signing is not configured. This release will remain unsigned and Windows SmartScreen can show Unknown publisher. Configure the documented repository secrets to publish signed releases.'

      - name: Create release notes
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
        run: |
          $signatureLine = if ($env:SIGNING_ENABLED -eq 'true') {
            '- ``Sidecar.exe`` is Authenticode-signed and timestamped with Microsoft Artifact Signing.'
          }
          else {
            '- This alpha artifact is currently unsigned, so Windows SmartScreen can display an Unknown publisher warning.'
          }

          @"
          ## Sidecar v$env:RELEASE_VERSION

          A Windows ChatGPT companion designed to preserve valuable Codex usage by offloading planning, debugging, review, and repository analysis—then returning the completed work to Codex as a detailed implementation handoff.

          ### Included

          - ``Sidecar.exe`` — self-contained 64-bit Windows application
          - ``README-FIRST.txt`` — short setup, handoff, and troubleshooting guide
          $signatureLine

          ### Changes

          - the custom Sidecar title bar follows the selected theme
          - Windows/DWM-owned frame, caption, border, and title text colors are synchronized to the active Sidecar theme where supported
          - theme changes update the native frame immediately without restarting Sidecar
          - release automation can Authenticode-sign and timestamp ``Sidecar.exe`` through Microsoft Artifact Signing when signing credentials are configured
          - retained exact manual drag-to-attach docking, context preview, secret filtering, and populate-only safety

          Sidecar populates prompts but does not auto-submit them.
          "@ | Set-Content artifacts/release-notes.md

      - name: Publish and mark latest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.title }}
        run: |
          $exists = $false
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            $exists = $true
          }

          if ($exists) {
            $assets = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
            foreach ($asset in $assets) {
              if (-not [string]::IsNullOrWhiteSpace($asset)) {
                gh release delete-asset $env:RELEASE_TAG $asset --repo $env:GITHUB_REPOSITORY --yes
              }
            }

            gh release upload $env:RELEASE_TAG `
              artifacts/release/Sidecar.exe `
              artifacts/release/README-FIRST.txt `
              --repo $env:GITHUB_REPOSITORY

            gh release edit $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
          else {
            gh release create $env:RELEASE_TAG `
              artifacts/release/Sidecar.exe `
              artifacts/release/README-FIRST.txt `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $env:RELEASE_TITLE `
              --notes-file artifacts/release-notes.md `
              --latest
          }
