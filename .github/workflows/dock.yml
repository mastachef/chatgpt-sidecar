name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - name: Exact WPF diagnostic
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $log = Join-Path $env:RUNNER_TEMP 'sidecar-build.log'
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet build apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --no-restore *>> $log
          }

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR WPF ERRORS ==='
            Get-Content $log | Where-Object { $_ -match 'error (CS|MC|MSB|NETSDK|NU|XDG)|: error |XamlParse|Markup' } | Select-Object -First 100
            Write-Host '=== END SIDECAR WPF ERRORS ==='
            exit 1
          }

          Get-Content $log | Select-Object -Last 30
