name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build diagnostic
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $project = 'apps/Sidecar.Dock/Sidecar.Dock.csproj'
          $log = Join-Path $env:RUNNER_TEMP 'sidecar-build.log'
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet build $project --configuration Release --no-restore *>> $log
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR BUILD ERRORS ==='
            Get-Content $log | Where-Object { $_ -match 'error (CS|MC|MSB|NETSDK|NU|XDG)|: error ' } | Select-Object -First 100
            Write-Host '=== END SIDECAR BUILD ERRORS ==='
            exit 1
          }
          Get-Content $log | Select-Object -Last 30
