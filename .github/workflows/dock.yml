name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - name: Exact native-test diagnostic
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $log = Join-Path $env:RUNNER_TEMP 'sidecar-tests.log'
          dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=normal" *>> $log
          }

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR TEST FAILURE ==='
            Get-Content $log | Where-Object { $_ -match '^\s*Failed |\[FAIL\]|Assert\.|Expected|Actual|Stack Trace|CodexHandoff|ChatGptWebView|ThemeManager|error (CS|MSB)' } | Select-Object -First 120
            Write-Host '=== END SIDECAR TEST FAILURE ==='
            exit 1
          }

          Get-Content $log | Select-Object -Last 30
