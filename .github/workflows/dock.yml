name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
      - name: Build native dock
        run: dotnet build apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --no-restore
      - name: Run native tests
        run: dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj --configuration Release --no-restore --logger "console;verbosity=normal"
      - name: Publish portable Windows alpha
        run: dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false -o artifacts/Sidecar.Dock-win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: Sidecar.Dock-win-x64
          path: artifacts/Sidecar.Dock-win-x64
          if-no-files-found: error
