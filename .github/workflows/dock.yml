name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  native-diagnostic:
    runs-on: windows-latest
    steps:
      - name: Build and expose only native test failures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $project = 'apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj'
          $log = Join-Path $env:RUNNER_TEMP 'sidecar-native-test.log'
          dotnet restore $project *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet test $project --configuration Release --no-restore --logger "console;verbosity=minimal" *> $log
          }

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR NATIVE TEST FAILURE ==='
            Get-Content $log |
              Select-String -Pattern 'Failed |Error Message:|Stack Trace:|Assert\.|Expected:|Actual:|error CS|Test Run Failed|Total tests:|Failed:' -Context 0,5 |
              ForEach-Object { $_.ToString() }
            Write-Host '=== END SIDECAR NATIVE TEST FAILURE ==='
            exit 1
          }

          Get-Content $log | Select-Object -Last 20
