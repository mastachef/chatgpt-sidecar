name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
      - name: Build native dock
        run: dotnet build apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --no-restore
      - name: Run native tests
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'sidecar-tests.log'
          dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj `
            --configuration Release `
            --no-restore `
            --logger "console;verbosity=normal" *> $log

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR TEST FAILURE ==='
            Get-Content $log | Where-Object {
              $_ -match '^\s*Failed ' -or
              $_ -match '^\s*Error Message:' -or
              $_ -match '^\s*Stack Trace:' -or
              $_ -match '^\s*Expected:' -or
              $_ -match '^\s*Actual:' -or
              $_ -match 'Assert\.' -or
              $_ -match '\[FAIL\]'
            } | Select-Object -First 120
            Write-Host '=== END SIDECAR TEST FAILURE ==='
            exit 1
          }

          Get-Content $log | Select-Object -Last 20
      - name: Publish single-file Windows alpha
        run: >-
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/Sidecar-win-x64
      - name: Smoke test packaged executable
        shell: pwsh
        run: |
          $publish = Join-Path $PWD 'artifacts/Sidecar-win-x64'
          $exe = Join-Path $publish 'Sidecar.exe'
          $oldExe = Join-Path $publish 'ChatGPT.Sidecar.Dock.exe'
          $launcher = Join-Path $publish 'START_SIDECAR.cmd'
          $readme = Join-Path $publish 'README-FIRST.txt'
          $startupLog = Join-Path $env:LOCALAPPDATA 'ChatGPTSidecar/Diagnostics/startup-crash.log'

          foreach ($required in @($exe, $launcher, $readme)) {
            if (-not (Test-Path $required)) {
              throw "Required published file missing: $required"
            }
          }

          if (Test-Path $oldExe) {
            throw "Legacy executable name is still being published: $oldExe"
          }

          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon($exe)
          if ($null -eq $icon -or $icon.Width -lt 16 -or $icon.Height -lt 16) {
            throw 'Sidecar.exe does not contain a valid Windows application icon.'
          }
          $icon.Dispose()

          Remove-Item $startupLog -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath $exe -ArgumentList '--startup-smoke-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path $startupLog) {
              Get-Content $startupLog
            }
            throw "Packaged Sidecar startup smoke test exited with code $($process.ExitCode)."
          }

          if (-not (Test-Path $startupLog)) {
            throw 'Packaged Sidecar did not create its startup report.'
          }

          $success = Select-String -Path $startupLog -Pattern 'startup.smoke_test.success' -Quiet
          if (-not $success) {
            Get-Content $startupLog
            throw 'Packaged Sidecar did not reach successful MainWindow construction.'
          }

          Get-Item $exe | Select-Object Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: Sidecar-win-x64
          path: artifacts/Sidecar-win-x64
          if-no-files-found: error
