name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - "apps/Sidecar.Dock.Tests/**"
      - ".github/workflows/dock.yml"

jobs:
  startup-build-diagnostic:
    runs-on: windows-latest
    steps:
      - name: Build and expose only startup compile failures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $project = 'apps/Sidecar.Dock/Sidecar.Dock.csproj'
          $log = Join-Path $env:RUNNER_TEMP 'sidecar-startup-build.log'
          dotnet restore $project *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet build $project --configuration Release --no-restore *> $log
          }

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR STARTUP BUILD FAILURE ==='
            Get-Content $log |
              Select-String -Pattern 'error CS|error MC|error MSB|error NETSDK|error NU|: error ' -Context 0,3 |
              ForEach-Object { $_.ToString() }
            Write-Host '=== END SIDECAR STARTUP BUILD FAILURE ==='
            exit 1
          }

          Get-Content $log | Select-Object -Last 20
