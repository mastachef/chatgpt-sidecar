name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - ".github/workflows/dock.yml"

jobs:
  startup-package-diagnostic:
    runs-on: windows-latest
    steps:
      - name: Publish and expose only packaged startup failure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          git init source | Out-Null
          Set-Location source
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git fetch --quiet --depth 1 origin $env:GITHUB_REF
          git checkout --quiet FETCH_HEAD

          $publish = Join-Path $env:RUNNER_TEMP 'Sidecar.Dock-win-x64'
          $publishLog = Join-Path $env:RUNNER_TEMP 'sidecar-publish.log'
          $startupLog = Join-Path $env:LOCALAPPDATA 'ChatGPTSidecar/Diagnostics/startup-crash.log'
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o $publish *> $publishLog

          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR SINGLE-FILE PUBLISH FAILURE ==='
            Get-Content $publishLog |
              Select-String -Pattern 'error CS|error MC|error MSB|error NETSDK|error NU|: error ' -Context 0,3 |
              ForEach-Object { $_.ToString() }
            Write-Host '=== END SIDECAR SINGLE-FILE PUBLISH FAILURE ==='
            exit 1
          }

          $exe = Join-Path $publish 'ChatGPT.Sidecar.Dock.exe'
          Remove-Item $startupLog -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath $exe -ArgumentList '--startup-smoke-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Host '=== SIDECAR PACKAGED STARTUP REPORT ==='
            if (Test-Path $startupLog) {
              Get-Content $startupLog
            } else {
              Write-Host '[no managed startup report was created]'
            }
            Write-Host "exit_code=$($process.ExitCode)"
            Write-Host '=== END SIDECAR PACKAGED STARTUP REPORT ==='
            exit 1
          }

          Write-Host '=== SIDECAR PACKAGED STARTUP SUCCESS ==='
          Get-Content $startupLog
          Write-Host '=== END SIDECAR PACKAGED STARTUP SUCCESS ==='
