name: Sidecar Dock

on:
  push:
    paths:
      - "apps/Sidecar.Dock/**"
      - ".github/workflows/dock.yml"
  pull_request:
    paths:
      - "apps/Sidecar.Dock/**"
      - ".github/workflows/dock.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Restore and build with compact diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $project = 'apps/Sidecar.Dock/Sidecar.Dock.csproj'
          $log = Join-Path $env:RUNNER_TEMP 'sidecar-build.log'
          dotnet restore $project *> $log
          if ($LASTEXITCODE -eq 0) {
            dotnet build $project --configuration Release --no-restore *> $log
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Host '=== SIDECAR BUILD ERRORS ==='
            Get-Content $log | Where-Object { $_ -match 'error (CS|MC|MSB|NETSDK|NU|XDG)|: error ' } | Select-Object -First 80
            Write-Host '=== END SIDECAR BUILD ERRORS ==='
            exit 1
          }
          Get-Content $log | Select-Object -Last 20
      - name: Publish portable alpha
        run: dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false -o artifacts/Sidecar.Dock-win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: Sidecar.Dock-win-x64
          path: artifacts/Sidecar.Dock-win-x64
