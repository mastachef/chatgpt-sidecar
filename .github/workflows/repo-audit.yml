name: Repository Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Verify cleaned repository layout
        shell: bash
        run: |
          set -euo pipefail
          git init -q source
          cd source
          git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          git fetch -q --depth 1 origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

          echo '=== TRACKED FILES ==='
          git ls-files
          echo "Tracked file count: $(git ls-files | wc -l)"

          echo '=== LEGACY RUNTIME REFERENCES ==='
          matches=$(grep -RInE --exclude-dir=.git --exclude=repo-audit.yml \
            'node:|\.mjs\b|quickchat|sidecar-hotkey|mcp/server|hooks/hooks|START_SIDECAR|README-FIRST|npm test|node --test|legacy:' . || true)
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            exit 1
          fi

          echo 'No legacy Node/MCP/Quick Chat/launcher references remain.'
