name: Repository Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Inventory tail and release state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git init -q source
          cd source
          git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          git fetch -q --depth 1 origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

          echo '=== FILE INVENTORY TAIL ==='
          git ls-files | tail -n +56

          echo '=== RELEASES ==='
          gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,name,isLatest,isPrerelease,publishedAt

          echo '=== RELEASE ASSETS ==='
          for tag in $(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName --jq '.[].tagName'); do
            echo "--- $tag ---"
            gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName,name,publishedAt,assets --jq '{tagName,name,publishedAt,assets:[.assets[]|{name,size,digest,downloadCount}]}'
          done
