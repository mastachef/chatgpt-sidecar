name: Repository Audit

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect recent release workflow state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          echo '=== RECENT RELEASE RUNS ==='
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release.yml --limit 8 --json databaseId,status,conclusion,headSha,createdAt,event,displayTitle
          latest=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "=== LATEST RELEASE RUN $latest KEY LINES ==="
          gh run view "$latest" --repo "$GITHUB_REPOSITORY" --log | grep -E 'Release signing mode|Trusted signing is not configured|Publish and mark latest|Verify Authenticode|Skip unsigned public release' || true
