name: Repository Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit legacy references
        shell: bash
        run: |
          set -euo pipefail
          git init -q source
          cd source
          git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          git fetch -q --depth 1 origin "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

          echo '=== LEGACY/CLUTTER REFERENCES ==='
          grep -RInE --exclude-dir=.git --exclude=repo-audit.yml \
            'START_SIDECAR|README-FIRST|quickchat|sidecar\.mjs|mcp/server|hooks/hooks|skills/sidecar|prompts/sidecar|package\.json|npm test|node --test|legacy:' . || true

          echo '=== TOP-LEVEL FILES/DIRS ==='
          find . -maxdepth 2 -mindepth 1 -not -path './.git*' -printf '%p\n' | sort
