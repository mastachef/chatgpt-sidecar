name: Sidecar CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify project metadata
        shell: pwsh
        run: |
          [xml]$project = Get-Content apps/Sidecar.Dock/Sidecar.Dock.csproj -Raw
          $version = $project.SelectSingleNode('/Project/PropertyGroup/Version').InnerText.Trim()
          $plugin = Get-Content .codex-plugin/plugin.json -Raw | ConvertFrom-Json
          if ($plugin.version -ne $version) {
            throw "Plugin version $($plugin.version) does not match native version $version."
          }

          $icon = 'apps/Sidecar.Dock/Assets/Sidecar.ico'
          $expected = 'b2eca7a7065f44de22cde4b5a9caec3ad6e048f21fc1c012654ba63bb882d144'
          $actual = (Get-FileHash $icon -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Canonical Sidecar artwork mismatch. Expected $expected, found $actual."
          }

      - name: Restore
        run: dotnet restore apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj

      - name: Test
        run: >-
          dotnet test apps/Sidecar.Dock.Tests/Sidecar.Dock.Tests.csproj
          --configuration Release
          --no-restore
          --logger "console;verbosity=normal"

      - name: Publish smoke build
        shell: pwsh
        run: |
          dotnet publish apps/Sidecar.Dock/Sidecar.Dock.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/ci-published

          $exe = 'artifacts/ci-published/Sidecar.exe'
          if (-not (Test-Path $exe)) {
            throw 'Sidecar.exe was not produced.'
          }

          & $exe --startup-smoke-test
          if ($LASTEXITCODE -ne 0) {
            throw "Sidecar startup smoke test failed with exit code $LASTEXITCODE."
          }
